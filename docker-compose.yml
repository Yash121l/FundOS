services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: signalos
      POSTGRES_PASSWORD: signalos
      POSTGRES_DB: signalos
    ports:
      - "5433:5432"       # 5433 on host so it never clashes with a local Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalos -d signalos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"       # 6380 on host so it never clashes with a local Redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── One-shot: run migrations + seed, then exit ──────────────────────────────

  migrate:
    build:
      context: .
      target: dev
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://signalos:signalos@db:5432/signalos
      DIRECT_URL: postgresql://signalos:signalos@db:5432/signalos
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        pnpm --filter @fundos/database generate &&
        pnpm db:migrate &&
        pnpm db:seed
      "
    restart: no

  # ── Application services ────────────────────────────────────────────────────

  web:
    build:
      context: .
      target: dev
    env_file: .env.docker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://signalos:signalos@db:5432/signalos
      DIRECT_URL: postgresql://signalos:signalos@db:5432/signalos
      REDIS_URL: redis://redis:6379
      # Bind Next.js dev server to all interfaces so it is reachable from the host
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3008:3000"       # Access on http://localhost:3008
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/apps/web/.next
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Run Next.js dev directly — avoids pnpm arg-quoting issues with --hostname flag
    command: ["sh", "-c", "cd /app/apps/web && node_modules/.bin/next dev --hostname 0.0.0.0 --port 3000"]
    restart: unless-stopped

  api:
    build:
      context: .
      target: dev
    env_file: .env.docker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://signalos:signalos@db:5432/signalos
      DIRECT_URL: postgresql://signalos:signalos@db:5432/signalos
      REDIS_URL: redis://redis:6379
      PORT: "3001"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: pnpm --filter @fundos/api dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  node_modules:
  next_cache:
